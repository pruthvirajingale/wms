<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Workers</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body class="print-detail-only">

<div id="navbar-placeholder"></div>

<div class="container">
    <div id="listSection">
        <h2>All Workers</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="workersTableBody"></tbody>
        </table>
    </div>

    <div id="detailSection"></div>
</div>

<script src="assets/db.js"></script>
<script src="assets/app.js"></script>
<script>
    function renderWorkerList() {
        const workers = DB.Workers.all();
        const tbody = document.getElementById("workersTableBody");
        if (workers.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="no-jobs">No workers found.</td></tr>`;
            return;
        }
        tbody.innerHTML = workers.map(w => `
            <tr>
                <td>${w.id}</td>
                <td><a class="name-link" href="view_workers.html?worker_id=${w.id}">${Util.escapeHtml(w.name)}</a></td>
                <td>${Util.escapeHtml(w.contact)}</td>
                <td>
                    <a href="edit_worker.html?id=${w.id}" class="btn edit-btn">Edit</a>
                    <a href="#" class="btn delete-btn" onclick="deleteWorker(${w.id}); return false;">Delete</a>
                </td>
            </tr>
        `).join("");
    }

    function deleteWorker(id) {
        if (!confirm("Are you sure you want to delete this worker?")) return;
        DB.Workers.delete(id);
        window.location.href = "view_workers.html";
    }

    function renderWorkerDetail() {
        const workerId = Util.qs("worker_id");
        const detailSection = document.getElementById("detailSection");
        const listSection = document.getElementById("listSection");
        if (!workerId) {
            detailSection.innerHTML = "";
            listSection.style.display = "";
            return;
        }
        // Match original JSP behavior: hide the "All Workers" list when viewing a specific worker
        listSection.style.display = "none";
        const w = DB.Workers.get(workerId);
        if (!w) {
            detailSection.innerHTML = `<p style="color:red">Error fetching details: worker not found.</p>`;
            return;
        }
        detailSection.innerHTML = `
            <div class="detail-box">
                <h3>Worker Details</h3>
                <p><strong>ID:</strong> ${w.id}</p>
                <p><strong>Name:</strong> ${Util.escapeHtml(w.name)}</p>
                <p><strong>Contact:</strong> ${Util.escapeHtml(w.contact)}</p>
                <p><strong>Address:</strong> ${w.address ? Util.escapeHtml(w.address) : "N/A"}</p>
                <button class="print-btn" onclick="printDetail()">Print</button>
            </div>`;
    }

    function printDetail() {
        document.body.classList.add("printing");
        window.print();
        setTimeout(() => document.body.classList.remove("printing"), 500);
    }

    renderWorkerList();
    renderWorkerDetail();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Worker</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="edit-form">
    <h2>Edit Worker</h2>
    <div id="resultMessage"></div>
    <form id="editWorkerForm">
        <label>Name:</label>
        <input type="text" id="name" name="name" required>

        <label>Contact:</label>
        <input type="tel" id="contact" name="contact" required pattern="[0-9]{10}">

        <label>Address:</label>
        <input type="text" id="address" name="address">

        <button type="submit">Update Worker</button>
    </form>
</div>

<script src="assets/db.js"></script>
<script src="assets/app.js"></script>
<script>
    const workerId = Util.qs("id");
    if (!workerId) {
        document.querySelector(".edit-form").innerHTML = `<p style="color:red;">No worker ID specified.</p>`;
    } else {
        const worker = DB.Workers.get(workerId);
        if (!worker) {
            document.querySelector(".edit-form").innerHTML = `<p style="color:red;">Worker not found.</p>`;
        } else {
            document.getElementById("name").value = worker.name;
            document.getElementById("contact").value = worker.contact;
            document.getElementById("address").value = worker.address || "";

            document.getElementById("editWorkerForm").addEventListener("submit", function (e) {
                e.preventDefault();
                const name = document.getElementById("name").value;
                const contact = document.getElementById("contact").value;
                const address = document.getElementById("address").value;

                try {
                    DB.Workers.update(workerId, name, contact, address);
                    document.getElementById("resultMessage").innerHTML =
                        `<div class="message">Worker updated successfully!</div>`;
                } catch (err) {
                    document.getElementById("resultMessage").innerHTML =
                        `<p style="color:red;">Error: ${Util.escapeHtml(err.message)}</p>`;
                }
            });
        }
    }
</script>
</body>
</html>
